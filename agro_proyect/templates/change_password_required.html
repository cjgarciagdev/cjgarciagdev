<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO-MASTER | Cambio de Contraseña Obligatorio</title>
    <script src="{{ url_for('static', filename='vendor/tailwindcss.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/fontawesome.js') }}"></script>
    <style>
        :root {
            --primary-green: #1b4332;
            --secondary-green: #2d6a4f;
            --accent-yellow: #ffca3a;
        }

        body {
            background-color: var(--primary-green);
            background-image:
                radial-gradient(at 10% 10%, hsla(145, 63%, 42%, 1) 0, transparent 50%),
                radial-gradient(at 90% 90%, hsla(145, 63%, 20%, 1) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-y: auto;
            padding: 2.5rem 0;
            box-sizing: border-box;
        }

        .login-container {
            width: 100%;
            max-width: 28.125rem;
            padding: 1.25rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(0.625rem);
            border-radius: 1.5rem;
            box-shadow: 0 1.5625rem 3.125rem -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 2.5rem 1.25rem 1.25rem;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            color: var(--secondary-green);
            background: #e6f4ea;
            width: 5rem;
            height: 5rem;
            line-height: 5rem;
            border-radius: 50%;
            margin: 0 auto 0.9375rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-green);
        }

        .form-container {
            padding: 1.25rem 2.5rem 2.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.375rem;
        }

        input {
            width: 100%;
            padding: 0.875rem;
            border: 0.125rem solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 0.9375rem;
            box-sizing: border-box;
            background-color: #f9fafb;
        }

        .btn-action {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .alert-box {
            background: #fffbeb;
            border: 0.0625rem solid #fef3c7;
            padding: 0.9375rem;
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            display: flex;
            gap: 0.75rem;
            color: #92400e;
            font-size: 0.875rem;
        }

        .error-message {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 0.625rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            border-left: 0.3125rem solid #ef4444;
        }

        .input-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--secondary-green);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>Actualizar Contraseña</h1>
            </div>

            <div class="form-container">
                <div class="alert-box">
                    <i class="fas fa-info-circle" style="font-size: 1.25rem; margin-top: 0.125rem;"></i>
                    <p>Por seguridad, debes cambiar tu contraseña temporal antes de acceder al sistema.</p>
                </div>

                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i> {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/change-password-required">
                    <div class="form-group">
                        <label for="nueva_password">Nueva Contraseña</label>
                        <div class="input-wrapper">
                            <input type="password" id="nueva_password" name="nueva_password" required
                                placeholder="Ingresa tu nueva contraseña">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('nueva_password', this)"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirmar Contraseña</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm_password" name="confirm_password" required
                                placeholder="Repite la contraseña">
                            <i class="fas fa-eye toggle-password"
                                onclick="togglePassword('confirm_password', this)"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-action">Guardar y Continuar</button>
                </form>

                <a href="/logout"
                    style="display: block; text-align: center; margin-top: 1.25rem; color: #6b7280; font-size: 0.875rem; text-decoration: none;">
                    Cerrar sesión
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            const icon = iconEl.tagName === 'svg' ? iconEl : (iconEl.querySelector('svg') || iconEl);
            if (isPassword) {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
