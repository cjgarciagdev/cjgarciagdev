<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO-MASTER | Iniciar Sesión</title>
    <script src="{{ url_for('static', filename='vendor/tailwindcss.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/fontawesome.js') }}"></script>
    <style>
        :root {
            --primary-green: #1b4332;
            --secondary-green: #2d6a4f;
            --accent-yellow: #ffca3a;
            --surface-color: #f3f4f6;
        }

        body {
            background-color: var(--primary-green);
            background-image:
                radial-gradient(at 10% 10%, hsla(145, 63%, 42%, 1) 0, transparent 50%),
                radial-gradient(at 90% 90%, hsla(145, 63%, 20%, 1) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-y: auto;
            padding: 1.25rem 0;
            box-sizing: border-box;
        }

        /* --- SPLASH SCREEN ANIMATION --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1b4332;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            animation: fadeOutSplash 0.8s ease-in-out 2.5s forwards;
        }

        .splash-icon {
            font-size: 5rem;
            color: var(--accent-yellow);
            animation: pulseIcon 2s infinite ease-in-out;
            margin-bottom: 1.25rem;
        }

        .splash-text {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 0.125rem;
            opacity: 0;
            transform: translateY(1.25rem);
            animation: fadeInUpText 0.8s ease-out 0.5s forwards;
        }

        .splash-sub {
            font-size: 1.2rem;
            opacity: 0;
            margin-top: 0.625rem;
            animation: fadeInUpText 0.8s ease-out 1s forwards;
            color: rgba(255, 255, 255, 0.8);
        }

        /* --- LOGIN CARD --- */
        .login-container {
            width: 100%;
            max-width: 28.125rem;
            padding: 1.25rem;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(0.625rem);
            border-radius: 1.5rem;
            box-shadow: 0 1.5625rem 3.125rem -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            opacity: 0;
            /* Initially hidden */
            transform: translateY(1.875rem);
            /* Animation triggers via JS or delay */
            animation: slideInCard 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 2.8s forwards;
        }

        .header {
            background: transparent;
            color: var(--primary-green);
            padding: 2.5rem 1.25rem 1.25rem;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 0.625rem;
            color: var(--secondary-green);
            background: #e6f4ea;
            width: 5rem;
            height: 5rem;
            line-height: 5rem;
            border-radius: 50%;
            margin: 0 auto 0.9375rem;
            box-shadow: 0 0.25rem 0.375rem -1px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin: 0;
            color: var(--primary-green);
            letter-spacing: -0.0.3125rem;
        }

        .header p {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 0.3125rem;
        }

        .form-container {
            padding: 1.25rem 2.5rem 2.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.375rem;
            margin-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            transition: color 0.3s;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.875rem 0.875rem 0.875rem 2.8125rem;
            /* Space for icon */
            border: 0.125rem solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 0.9375rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #f9fafb;
            color: #1f2937;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-green);
            background-color: #D3F3DB;
            box-shadow: 0 0 0 0.25rem rgba(45, 106, 79, 0.1);
        }

        input:focus+.input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--secondary-green);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            transition: color 0.3s;
            z-index: 10;
        }

        .toggle-password:hover {
            color: var(--secondary-green);
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0.9375rem;
            box-shadow: 0 0.25rem 0.375rem -1px rgba(27, 67, 50, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 0.625rem 0.9375rem -3px rgba(27, 67, 50, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 0.625rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            border-left: 0.3125rem solid #ef4444;
            display: flex;
            align-items: center;
            gap: 0.625rem;
            animation: shake 0.5s ease-in-out;
        }

        /* --- ANIMATIONS KEYFRAMES --- */
        @keyframes pulseIcon {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0.625rem rgba(255, 202, 58, 0.3));
            }

            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 1.25rem rgba(255, 202, 58, 0.6));
            }
        }

        @keyframes fadeInUpText {
            from {
                opacity: 0;
                transform: translateY(1.875rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOutSplash {
            from {
                opacity: 1;
                visibility: visible;
            }

            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes slideInCard {
            from {
                opacity: 0;
                transform: translateY(2.5rem) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(4px);
            }
        }

        .footer-branding {
            text-align: center;
            padding-top: 1.25rem;
            font-size: 0.75rem;
            color: #9ca3af;
            border-top: 0.0625rem solid #f3f4f6;
            margin-top: 0.625rem;
        }
    </style>
</head>

<body>
    <!-- Entrance Animation / Splash Screen -->
    <div id="splash-screen">
        <i class="fas fa-seedling splash-icon"></i>
        <div class="splash-text">AGRO-MASTER</div>
        <div class="splash-sub">Gestión Inteligente para el Campo</div>
    </div>

    <!-- Page Transition Curtain -->
    <div id="page-curtain">
        <div class="flex flex-col items-center">
            <i class="fas fa-seedling curtain-logo"></i>
            <span class="text-white font-black tracking-widest mt-4" id="curtain-text">INICIANDO SESIÓN...</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="login-container">
        <div class="login-card stagger-item" style="animation-delay: 2.8s;">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-seedling"></i>
                </div>
                <h1>Bienvenido</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <div class="form-container">
                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                {% if success %}
                <div
                    class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4 rounded shadow-sm flex items-center gap-3">
                    <i class="fas fa-check-circle"></i>
                    <span class="text-sm">{{ success }}</span>
                </div>
                {% endif %}

                <form method="post" action="/login" id="loginForm">
                    <div class="form-group stagger-item" style="animation-delay: 3s;">
                        <label for="username">Usuario</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="username" name="username" required placeholder="Ej: admin"
                                autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group stagger-item" style="animation-delay: 3.1s;">
                        <div class="flex justify-between items-center mb-1">
                            <label for="password" class="mb-0">Contraseña</label>
                            <a href="/forgot-password" id="forgotPassLink"
                                class="text-xs text-secondary-green hover:underline font-semibold">¿Olvidaste tu
                                contraseña?</a>
                        </div>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" name="password" required placeholder="••••••••"
                                autocomplete="current-password">
                            <i class="fas fa-eye toggle-password" id="togglePassword"
                                onclick="togglePassword('password', this)"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-login stagger-item" style="animation-delay: 3.2s;">
                        Acceder al Sistema
                    </button>
                </form>

                <div class="footer-branding stagger-item" style="animation-delay: 3.4s;">
                    <p>© 2026 AGRO-MASTER | Versión 7.0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Reusable Styles for Transitions (Temporary here, integrated in _head later if needed, but login doesn't use _head) -->
    <style>
        #page-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1b4332;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(100%);
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #page-curtain.active {
            transform: translateY(0);
        }

        .curtain-logo {
            color: #ffca3a;
            font-size: 4rem;
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .stagger-item {
            opacity: 0;
            animation: slideInCard 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>

    <script>
        // Trigger curtain on form submit
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            const curtain = document.getElementById('page-curtain');
            const curtainText = document.getElementById('curtain-text');
            if (curtainText) curtainText.innerText = 'INICIANDO SESIÓN...';
            curtain.classList.add('active');
        });

        // Trigger curtain on forgot password
        const forgotLink = document.getElementById('forgotPassLink');
        if (forgotLink) {
            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                const curtain = document.getElementById('page-curtain');
                const curtainText = document.getElementById('curtain-text');
                if (curtainText) curtainText.innerText = 'RECUPERANDO ACCESO...';
                curtain.classList.add('active');
                setTimeout(() => {
                    window.location.href = forgotLink.href;
                }, 1200);
            });
        }

        // Remove splash screen fully from DOM after animation
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.pointerEvents = 'none';
                }
            }, 3500);
        });

        // Robust Password Toggle
        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (!input) return;

            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';

            if (isPassword) {
                iconEl.classList.remove('fa-eye');
                iconEl.classList.add('fa-eye-slash');
            } else {
                iconEl.classList.remove('fa-eye-slash');
                iconEl.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
