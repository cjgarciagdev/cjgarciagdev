<!-- TAB CONTENT: Protocolos y Historial -->
<div id="tabContent-protocolos" class="tab-content-salud">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Left Column: Medical Profile & Actions -->
        <div class="lg:col-span-4 space-y-6">
            <!-- Medical Summary Card -->
            <div id="healthSummaryCard"
                class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 relative overflow-hidden">
                <!-- Injected via JS -->
            </div>

            <!-- Quick Actions -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="openModalSalud()"
                    class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200 transition transform hover:-translate-y-1 text-left relative overflow-hidden group">
                    <div
                        class="absolute right-0 top-0 w-16 h-16 bg-white opacity-10 rounded-bl-full transform translate-x-4 -translate-y-4 group-hover:scale-110 transition">
                    </div>
                    <i class="fas fa-syringe text-2xl mb-2"></i>
                    <div class="text-sm">Nuevo<br>Protocolo</div>
                </button>
                <button onclick="openModalExpediente()"
                    class="bg-white hover:bg-red-50 text-red-500 border-2 border-red-100 p-4 rounded-2xl font-bold transition transform hover:-translate-y-1 text-left">
                    <i class="fas fa-file-medical text-2xl mb-2"></i>
                    <div class="text-sm">Editar<br>Historial</div>
                </button>
            </div>
        </div>

        <!-- Right Column: Timeline & Protocols -->
        <div class="lg:col-span-8 space-y-8">

            <!-- INTEGRACIÓN: Plan de Maternidad Activo (si existe) -->
            <div id="maternityPlanContainer" class="hidden">
                <!-- Injected via JS -->
            </div>

            <!-- Active Protocols Section -->
            <div>
                <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                    <span
                        class="bg-yellow-100 text-yellow-700 w-6 h-6 rounded-full flex items-center justify-center text-xs"><i
                            class="fas fa-clock"></i></span>
                    Protocolos Pendientes / Activos
                </h3>
                <div id="activeProtocolsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Injected via JS -->
                    <p class="text-gray-400 italic text-sm col-span-full">No hay protocolos activos.</p>
                </div>
            </div>

            <!-- Protocol Templates Section -->
            <div class="mt-10">
                <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                    <span
                        class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-xs"><i
                            class="fas fa-copy"></i></span>
                    Plantillas de Protocolos Rápidos
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button onclick="applyProtocolTemplate('vacunacion_anual')"
                        class="p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:border-blue-500 hover:shadow-md transition text-left group">
                        <i class="fas fa-syringe text-blue-500 mb-2 group-hover:scale-110 transition"></i>
                        <p class="text-[0.625rem] font-bold text-gray-800 uppercase leading-tight">Vacunación
                            Anual</p>
                    </button>
                    <button onclick="applyProtocolTemplate('desparasitacion_trimestral')"
                        class="p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:border-purple-500 hover:shadow-md transition text-left group">
                        <i class="fas fa-pills text-purple-500 mb-2 group-hover:scale-110 transition"></i>
                        <p class="text-[0.625rem] font-bold text-gray-800 uppercase leading-tight">
                            Desparasitación Q3</p>
                    </button>
                    <button onclick="applyProtocolTemplate('chequeo_reproductivo')"
                        class="p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:border-pink-500 hover:shadow-md transition text-left group">
                        <i class="fas fa-venus-mars text-pink-500 mb-2 group-hover:scale-110 transition"></i>
                        <p class="text-[0.625rem] font-bold text-gray-800 uppercase leading-tight">Chequeo Repro
                        </p>
                    </button>
                    <button onclick="applyProtocolTemplate('suplementacion_crecimiento')"
                        class="p-3 bg-white border border-gray-100 rounded-xl shadow-sm hover:border-green-500 hover:shadow-md transition text-left group">
                        <i class="fas fa-chart-line text-green-500 mb-2 group-hover:scale-110 transition"></i>
                        <p class="text-[0.625rem] font-bold text-gray-800 uppercase leading-tight">
                            Suplementación</p>
                    </button>
                </div>
            </div>

            <!-- History Timeline Section -->
            <div>
                <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
                    <span
                        class="bg-gray-100 text-gray-600 w-6 h-6 rounded-full flex items-center justify-center text-xs"><i
                            class="fas fa-history"></i></span>
                    Línea de Tiempo
                </h3>
                <div class="relative pl-4 border-l-2 border-gray-100 space-y-8" id="healthHistoryTimeline">
                    <!-- Injected via JS -->
                </div>
            </div>

        </div>
    </div>
</div>
<!-- END TAB: Protocolos y Historial -->
