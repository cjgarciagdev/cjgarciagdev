<!-- Header de Sección Salud -->
<div class="mb-10">
    <div class="flex items-center gap-4 mb-2">
        <div
            class="bg-gradient-to-br from-red-500 to-rose-700 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
            <i class="fas fa-heartbeat text-white text-2xl"></i>
        </div>
        <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">Salud y Protocolos</h2>
    </div>
    <p class="text-gray-500 ml-16">Historial clínico digital e intervenciones veterinarias</p>
</div>

<div class="mb-8 bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
    <!-- Tabs Navigation -->
    <div class="flex gap-2 mb-6 border-b-2 border-gray-100">
        <button onclick="switchSaludTab('protocolos')" id="tab-salud-protocolos"
            class="tab-salud px-6 py-3 font-bold text-red-600 border-b-4 border-red-600 bg-red-50 rounded-t-xl transition">
            <i class="fas fa-heartbeat mr-2"></i>Protocolos y Historial
        </button>
        <button onclick="switchSaludTab('maternidad')" id="tab-salud-maternidad"
            class="tab-salud px-6 py-3 font-bold text-gray-500 hover:bg-gray-50 rounded-t-xl transition">
            <i class="fas fa-baby-carriage mr-2"></i>Maternidad
        </button>
    </div>

    <!-- Selector de Animal (compartido) -->
    <div class="flex items-center gap-4">
        <div class="bg-gray-100 p-3 rounded-full">
            <i class="fas fa-search text-gray-500"></i>
        </div>
        <div class="flex-grow">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Paciente</label>
            <select id="selectAnimalSalud" onchange="loadSaludAnimal()"
                class="w-full bg-transparent font-bold text-xl text-gray-800 outline-none cursor-pointer">
                <option value="">Seleccionar del rebaño...</option>
            </select>
        </div>
    </div>
</div>
