<!-- Columna Derecha: Dashboard del Plan -->
<div class="lg:col-span-8 flex flex-col h-full">
    <!-- Action Bar Integrada (Reemplaza a la fija que se superponía) -->
    <div id="nutricionActionBar" class="mb-6 flex flex-wrap gap-4 hidden bg-white p-4 rounded-3xl border border-gray-100 shadow-sm">
        <button onclick="openModalNutricion()"
            class="flex-1 bg-gradient-to-r from-green-600 to-emerald-700 hover:from-green-500 hover:to-emerald-600 text-white px-6 py-4 rounded-2xl font-bold transition transform hover:-translate-y-1 flex items-center justify-center gap-3 shadow-lg shadow-green-100">
            <i class="fas fa-edit"></i> <span id="btnTextEditar">Gestionar Plan</span>
        </button>
        <button onclick="exportarPlanIndividual(event)"
            class="bg-white text-blue-800 border-2 border-blue-50 hover:bg-blue-50 hover:border-blue-100 px-6 py-4 rounded-2xl font-bold transition transform hover:-translate-y-1 flex items-center gap-3">
            <div class="bg-blue-100 p-2 rounded-full text-blue-600">
                <i class="fas fa-file-pdf"></i>
            </div>
            <span>Exportar</span>
        </button>
    </div>

    <div id="nutricionContent" class="flex-grow">
        <!-- Empty State -->
        <div
            class="bg-white rounded-3xl shadow-sm border border-gray-100 p-12 text-center h-full flex flex-col items-center justify-center">
            <div class="bg-green-50 w-24 h-24 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-utensils text-green-300 text-4xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Sin selección activa</h3>
            <p class="text-gray-400 max-w-sm mx-auto">Selecciona un animal de la lista o busca uno nuevo
                para ver y gestionar su plan nutricional.</p>
        </div>
    </div>
</div>
