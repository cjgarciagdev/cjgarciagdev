<!-- Modal Selector de Animal Filtrado -->
<div id="modalSelectorGenealogia" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl">
        <h4 class="font-bold text-lg mb-4" id="selector-title">Seleccionar Animal</h4>

        <input type="text" id="selector-search" placeholder="Buscar por ID..."
            class="w-full p-2 border rounded mb-3 bg-gray-50">

        <div id="selector-list" class="max-h-60 overflow-y-auto space-y-2 mb-4">
            <!-- Lista dinámica -->
        </div>

        <div class="flex justify-end gap-2">
            <button onclick="closeSelector()"
                class="px-4 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded">Cancelar</button>
        </div>
    </div>
</div>
