<!-- Chart Panel -->
<div

    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
        <div>
            <h3 class="font-bold text-gray-800 text-lg sm:text-xl flex items-center gap-3">
                <span class="bg-emerald-100 text-emerald-600 p-2 rounded-lg"><i class="fas fa-chart-line"></i></span>
