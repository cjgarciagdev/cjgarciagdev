<!-- Notifications Panel (Activity Panel) -->
<div id="recentActivityPanel"
    class="bg-white rounded-3xl shadow-sm border border-gray-100 transition-all duration-500 ease-in-out overflow-hidden flex flex-col h-[31.25rem] w-full lg:w-1/3 flex-shrink-0 hover-lift">
    <div class="p-6 pb-2 cursor-pointer flex justify-between items-center bg-white z-10"
        onclick="toggleActivityPanel()">
        <h3 class="font-bold text-gray-800 flex items-center gap-3 whitespace-nowrap overflow-hidden"
            id="activityTitle">
            <span class="bg-indigo-100 text-indigo-600 p-2 rounded-lg flex-shrink-0"><i
                    class="fas fa-clipboard-list"></i></span>
            <span class="transition-opacity duration-300">Actividad Reciente</span>
        </h3>
        <div class="p-2 hover:bg-gray-100 rounded-full transition">
            <i id="activityChevron" class="fas fa-chevron-right text-gray-400 transition-transform duration-300"></i>
        </div>
    </div>
    <div id="notificationsContainer" class="flex-1 overflow-hidden transition-opacity duration-300 p-6 pt-0">
        <div id="notifications" class="space-y-3 overflow-y-auto custom-scrollbar h-full pr-2">
            <div class="text-center py-10 opacity-50">
                <i class="fas fa-spinner fa-spin text-2xl text-gray-300"></i>
            </div>
        </div>
    </div>
</div>
