<!-- Modal Nuevo Insumo -->
<div id="modalInsumo"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center animate-fadeIn">
    <div
        class="bg-white rounded-3xl shadow-2xl w-full max-w-lg mx-4 transform transition-all scale-100 modal-content-wrapper scale-in">
        <div class="bg-gradient-to-r from-teal-600 to-emerald-700 p-6 flex justify-between items-center">
            <h3 class="text-xl font-black text-white flex items-center gap-2">
                <i class="fas fa-box-open"></i> Nuevo Insumo
            </h3>
            <button onclick="closeModalInsumo()"
                class="text-white/80 hover:text-white transition rounded-full p-1 hover:bg-white/10">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="p-8 space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre del Producto</label>
                <input type="text" id="insNombre"
                    class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-teal-500 outline-none font-bold text-gray-700">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Categoría</label>
                    <select id="insCategoria"
                        class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-teal-500 outline-none font-bold text-gray-700">
                        <option value="Médico">Médico</option>
                        <option value="Alimenticio">Alimenticio</option>
                        <option value="Operativo">Operativo</option>
                        <option value="Herramienta">Herramienta</option>
                        <option value="Limpieza">Limpieza</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Unidad</label>
                    <select id="insUnidad"
                        class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-teal-500 outline-none font-bold text-gray-700">
                        <option value="unidad">Unidad(es)</option>
                        <option value="ml">Mililitros (ml)</option>
                        <option value="lt">Litros</option>
                        <option value="gr">Gramos</option>
                        <option value="kg">Kilogramos</option>
                        <option value="dosis">Dosis</option>
                        <option value="saco">Saco(s)</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Cantidad Inicial</label>
                    <input type="number" id="insCantidad" onkeydown="validateInputNumerico(event)"
                        class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-teal-500 outline-none font-bold text-gray-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Stock Mínimo</label>
                    <input type="number" id="insMinimo" value="5" onkeydown="validateInputNumerico(event)"
                        class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-teal-500 outline-none font-bold text-gray-700">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Fecha Vencimiento
                    (Opcional)</label>
                <input type="date" id="insVencimiento"
                    class="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-teal-500 outline-none font-bold text-gray-700">
            </div>

            <button onclick="saveInsumo()"
                class="w-full bg-teal-600 text-white font-bold py-4 rounded-xl hover:bg-teal-700 transition shadow-lg shadow-teal-200 mt-4">
                Guardar Insumo
            </button>
        </div>
    </div>
</div>
