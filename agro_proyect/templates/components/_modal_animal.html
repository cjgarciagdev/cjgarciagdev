<!-- Modal para editar/añadir animal -->
<div id="modalAnimal"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-2xl w-full p-8 shadow-2xl modal-content-wrapper scale-in">
        <h3 id="modalTitle" class="text-2xl font-black mb-6 text-gray-800">Registrar Nuevo Animal</h3>
        <input type="hidden" id="in-id">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-700">Especie:</label>
                <select id="in-especie" onchange="updateRazas()"
                    class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    <option value="Bovino">Bovino</option>
                    <option value="Ovino">Ovino</option>
                    <option value="Caprino">Caprino</option>
                    <option value="Porcino">Porcino</option>
                    <option value="Equino">Equino</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-700">Raza:</label>
                <input type="text" id="in-raza" list="razas-list" onchange="validateRaza()" onblur="validateRaza()"
                    class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
                    placeholder="Selecciona de la lista">
                <datalist id="razas-list"></datalist>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-700">Sexo:</label>
                <select id="in-sexo" onchange="updateEstados()"
                    class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    <option value="Macho">Macho</option>
                    <option value="Hembra">Hembra</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-700">Fecha Nacimiento:</label>
                <input type="date" id="in-fecha_nacimiento"
                    class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-700">Peso (kg):</label>
                <input type="number" id="in-peso" step="0.5" onkeydown="validateInputNumerico(event)"
                    class="w-full p-3 border-2 border-gray-300 rounded-xl focus:border-green-500 outline-none"
                    placeholder="0.0">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-gray-700">Estado:</label>
                <select id="in-estado"
                    class="w-full p-3 border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    <option value="Saludable">Saludable</option>
                    <option value="Enfermo">Enfermo</option>
                    <option value="Crítico">Crítico</option>
                    <option value="Cuarentena">Cuarentena</option>
                    <option value="En Observación">En Observación</option>
                    <option value="Vendido">Vendido</option>
                    <option value="Muerto">Muerto</option>
                    <option value="Gestante">Gestante</option>
                    <option value="Lactancia">Lactancia</option>
                    <option value="Parto Reciente">Parto Reciente</option>
                    <option value="Secado">Secado</option>
                </select>
            </div>
        </div>
        <div class="flex gap-4 mt-6">
            <button onclick="saveAnimal()"
                class="flex-1 bg-green-700 text-white py-3 rounded-xl font-bold hover:bg-green-800 transition">GUARDAR</button>
            <button onclick="closeModal()"
                class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-xl font-bold">Cancelar</button>
        </div>
    </div>
</div>
