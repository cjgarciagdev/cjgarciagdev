<!-- Modal para Expediente Médico -->
<div id="modalExpediente"
    class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
        class="bg-white rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl max-h-[90vh] overflow-y-auto border-4 border-red-500 relative">
        <button onclick="closeModalExpediente()"
            class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 transition">
            <i class="fas fa-times text-2xl"></i>
        </button>

        <div class="flex items-center gap-4 mb-8">
            <div class="bg-red-100 p-3 rounded-xl">
                <i class="fas fa-file-medical-alt text-red-600 text-xl"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black text-gray-800">Expediente Médico Digital</h3>
                <p class="text-gray-500 text-sm">Información crítica y antecedentes del paciente</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Tipo
                        Sanguíneo</label>
                    <div class="relative">
                        <input type="text" id="expTipoSangre"
                            class="w-full p-4 pl-12 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition font-bold text-gray-700"
                            placeholder="Ej: A+">
                        <i class="fas fa-tint absolute left-4 top-1/2 transform -translate-y-1/2 text-red-300"></i>
                    </div>
                </div>
            </div>

            <div>
                <label
                    class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle text-orange-500"></i> Alergias y Reacciones
                </label>
                <textarea id="expAlergias" rows="2"
                    class="w-full p-4 border-2 border-orange-100 bg-orange-50 rounded-xl focus:border-orange-500 outline-none transition"
                    placeholder="Listado de alergias conocidas..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Enfermedades
                    Crónicas</label>
                <textarea id="expCronicas" rows="2"
                    class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition"
                    placeholder="Condiciones de largo plazo..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Antecedentes
                    Genéticos</label>
                <textarea id="expGeneticos" rows="2"
                    class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition"
                    placeholder="Historial familiar relevante..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Notas
                    Generales</label>
                <textarea id="expNotas" rows="3"
                    class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition"
                    placeholder="Observaciones adicionales..."></textarea>
            </div>
        </div>

        <div class="flex gap-4 mt-8 pt-4 border-t border-gray-50">
            <button onclick="saveExpediente()"
                class="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold hover:bg-red-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                ACTUALIZAR EXPEDIENTE
            </button>
            <button onclick="closeModalExpediente()"
                class="flex-1 bg-gray-50 text-gray-600 py-4 rounded-xl font-bold hover:bg-gray-100 transition">
                CANCELAR
            </button>
        </div>
    </div>
</div>
