<!-- Modal para nutrición -->
<div id="modalNutricion"
    class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
        class="bg-white rounded-[2rem] max-w-3xl w-full p-8 shadow-2xl max-h-[90vh] overflow-y-auto border-4 border-green-500 relative">

        <button onclick="closeModalNutricion()"
            class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 transition">
            <i class="fas fa-times text-2xl"></i>
        </button>

        <div class="flex items-center gap-4 mb-8">
            <div class="bg-green-100 p-3 rounded-xl">
                <i class="fas fa-edit text-green-600 text-xl"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black text-gray-800">Configurar Plan Nutricional</h3>
                <p class="text-gray-500 text-sm">Ajusta los parámetros de dieta según las recomendaciones</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Columna Izquierda: Datos Principales -->
            <div class="space-y-6">
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Peso
                        Referencia</label>
                    <div class="flex items-end gap-2">
                        <input type="number" id="animalPesoActual" readonly
                            class="bg-transparent text-2xl font-black text-gray-800 outline-none w-full border-b border-gray-200">
                        <span class="text-sm font-bold text-gray-500 mb-1">kg</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">Sistema de Alimentación</label>
                    <div class="relative">
                        <select id="planTipo"
                            class="w-full p-4 pl-12 bg-white border-2 border-gray-200 rounded-xl focus:border-green-500 focus:ring-0 outline-none transition font-bold text-gray-700 appearance-none">
                            <option value="Pastoreo">Pastoreo Extensivo</option>
                            <option value="Confinamiento">Confinamiento Total</option>
                            <option value="Semi-Confinamiento">Semi-Confinamiento</option>
                            <option value="Intensivo">Sistema Intensivo</option>
                        </select>
                        <i
                            class="fas fa-layer-group absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">Frecuencia de Alimentación</label>
                    <select id="planFrecuencia"
                        class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none transition bg-white text-gray-700">
                        <option value="">Seleccionar frecuencia...</option>
                        <option value="2 veces al día">2 veces al día</option>
                        <option value="3 veces al día">3 veces al día</option>
                        <option value="2 veces al día + Pastoreo libre">2 veces + Pastoreo</option>
                        <option value="Ad libitum">Ad libitum (Libre acceso)</option>
                    </select>
                </div>
            </div>

            <!-- Columna Derecha: Cantidades -->
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="group">
                        <label class="block text-sm font-bold mb-3 text-gray-700 flex items-center gap-2">
                            <i class="fas fa-carrot text-orange-500"></i> Forraje
                        </label>
                        <div class="relative">
                            <input type="number" id="planForraje" step="0.5" onkeydown="validateInputNumerico(event)"
                                class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none transition text-center font-bold text-lg">
                            <span
                                class="absolute right-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-gray-400">KG/DÍA</span>
                        </div>
                    </div>
                    <div class="group">
                        <label class="block text-sm font-bold mb-3 text-gray-700 flex items-center gap-2">
                            <i class="fas fa-cookie text-yellow-600"></i> Concentrado
                        </label>
                        <div class="relative">
                            <input type="number" id="planConcentrado" step="0.5"
                                onkeydown="validateInputNumerico(event)"
                                class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none transition text-center font-bold text-lg">
                            <span
                                class="absolute right-4 top-1/2 transform -translate-y-1/2 text-xs font-bold text-gray-400">KG/DÍA</span>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">Hidratación (Agua)</label>
                    <input type="text" id="planAgua" placeholder="Ej: 40 - 50 L/día"
                        class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-blue-400 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">Suplementos & Aditivos</label>
                    <input type="text" id="planSuplementos" placeholder="Ej: Sales minerales, Vitaminas..."
                        class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-purple-400 outline-none transition">
                </div>
            </div>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-100">
            <label class="block text-sm font-bold mb-2 text-gray-700">Notas u Observaciones</label>
            <textarea id="planObservaciones" rows="2" placeholder="Detalles adicionales sobre la dieta..."
                class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-green-500 outline-none transition resize-none"></textarea>
        </div>

        <div class="flex gap-4 mt-8 pt-4">
            <button onclick="saveNutricionPlan()"
                class="flex-1 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                GUARDAR PLAN
            </button>
            <button onclick="closeModalNutricion()"
                class="flex-1 bg-gray-100 text-gray-700 py-4 rounded-xl font-bold hover:bg-gray-200 transition">
                CANCELAR
            </button>
        </div>
    </div>
</div>
