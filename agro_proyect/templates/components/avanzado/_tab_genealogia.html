<!-- Contenido de Genealogía -->
<div id="content-genealogia" class="tab-content-analisis">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Visualización del Grafo -->
        <div class="lg:col-span-8 bg-white p-6 rounded-[2rem] shadow-sm border border-purple-100">
            <h4 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="bg-purple-100 text-purple-600 p-2 rounded-lg"><i class="fas fa-project-diagram"></i></span>
                Visualización del Grafo Genealógico
            </h4>
            <div id="grafo-visualizacion"
                class="w-full h-[31.25rem] bg-gradient-to-br from-purple-50/50 to-blue-50/50 rounded-2xl border-2 border-dashed border-purple-200 flex items-center justify-center overflow-hidden">
                <p class="text-gray-400 text-center">
                    <i class="fas fa-info-circle text-4xl mb-2"></i><br>
                    Selecciona un animal para visualizar su genealogía
                </p>
            </div>
            <div class="mt-6 bg-purple-50/50 p-4 rounded-xl">
                <p class="text-[0.625rem] text-purple-800 font-bold mb-3 uppercase tracking-wider text-center">
                    Leyenda del Grafo</p>
                <div class="flex flex-wrap justify-center gap-4 text-xs font-bold text-gray-600">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-purple-600"></div> Sujeto
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-blue-500"></div> Padres
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-green-500"></div> Abuelos
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div> Bisabuelos
                    </div>
                </div>
            </div>

        <!-- Análisis del Grafo -->
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-blue-100">
                <h4 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <span class="bg-blue-100 text-blue-600 p-2 rounded-lg"><i class="fas fa-analytics"></i></span>
                    Análisis Genealógico
                </h4>
                <div id="analisis-genealogia-content" class="space-y-4">
                    <p class="text-gray-400 text-sm text-center py-8 italic">Selecciona un animal para

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                    <p class="text-[0.625rem] font-bold text-gray-400 uppercase mb-1">Nodos</p>
                    <p id="grafo-nodos" class="text-2xl font-black text-gray-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">

                    <p id="grafo-aristas" class="text-2xl font-black text-gray-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                    <p class="text-[0.625rem] font-bold text-gray-400 uppercase mb-1">Profundidad</p>
                    <p id="grafo-profundidad" class="text-2xl font-black text-gray-800">0</p>
                </div>
