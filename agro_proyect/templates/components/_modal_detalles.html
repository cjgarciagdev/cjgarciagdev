<!-- Modal para ver detalles del animal -->
<div id="modalDetails"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
        class="bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] p-8 shadow-2xl overflow-y-auto modal-content-wrapper">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black text-gray-800">Detalles del Animal</h3>
            <button onclick="closeDetailsModal()" class="text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
        <div id="detailsContent">
            <p class="text-gray-500">Cargando detalles...</p>
        </div>
        <div class="flex gap-4 mt-6 flex-wrap">
            <button onclick="editAnimalFromDetails()"
                class="bg-green-600 text-white px-4 py-2 rounded font-bold text-sm hover:bg-green-700 transition">
                <i class="fas fa-edit mr-2"></i> Editar
            </button>
            <button onclick="exportHistorial(event)"
                class="bg-blue-500 text-white px-4 py-2 rounded font-bold text-sm hover:bg-blue-600 transition">
                <i class="fas fa-history mr-2"></i> Historial
            </button>
            <button onclick="deleteAnimalFromDetails()"
                class="bg-white border-2 border-red-100 text-red-500 px-4 py-2 rounded font-bold text-sm hover:bg-red-50 transition">
                <i class="fas fa-trash-alt mr-2"></i> Eliminar
            </button>
            <button onclick="closeDetailsModal()" class="bg-gray-100 text-gray-800 px-4 py-2 rounded font-bold text-sm">
                Cerrar
            </button>
        </div>
    </div>
</div>
