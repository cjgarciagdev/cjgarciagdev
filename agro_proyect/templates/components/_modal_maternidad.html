<!-- Modal para Plan de Maternidad -->
<div id="modalMaternityPlan"
    class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
        class="bg-white rounded-[2rem] max-w-2xl w-full p-8 shadow-2xl border-4 border-pink-500 relative max-h-[90vh] overflow-y-auto">
        <button onclick="closeModalMaternityPlan()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600">
            <i class="fas fa-times text-2xl"></i>
        </button>

        <div class="flex items-center gap-4 mb-8">
            <div class="bg-pink-100 p-3 rounded-xl">
                <i class="fas fa-calendar-alt text-pink-600 text-xl"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black text-gray-800">Plan de Maternidad Personalizado</h3>
                <p class="text-gray-500 text-sm">Define el seguimiento para gestación o lactancia</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Tipo de
                        Plan</label>
                    <select id="matPlanTipo"
                        class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-500 outline-none transition font-bold text-gray-700">
                        <option value="Gestación">Seguimiento de Gestación</option>
                        <option value="Lactancia">Programa de Lactancia</option>
                        <option value="Pre-Parto">Preparación Pre-Parto</option>
                        <option value="Recuperación">Recuperación Post-Parto</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Fecha
                        Estimada Parto</label>
                    <input type="date" id="matPlanFechaParto"
                        class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-500 outline-none transition font-bold text-gray-700">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Recomendaciones
                    Veterinarias</label>
                <textarea id="matPlanRecomendaciones" rows="3"
                    class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-pink-500 outline-none transition"
                    placeholder="Indicaciones específicas del facultativo..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Observaciones de
                    Campo</label>
                <textarea id="matPlanObservaciones" rows="2"
                    class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-pink-500 outline-none transition"
                    placeholder="Notas sobre comportamiento, alimentación, etc..."></textarea>
            </div>
        </div>

        <div class="flex gap-4 mt-8 pt-4 border-t border-gray-50">
            <button onclick="saveMaternityPlan()"
                class="flex-1 bg-pink-600 text-white py-4 rounded-xl font-bold hover:bg-pink-700 transition shadow-lg">
                GUARDAR PLAN
            </button>
            <button onclick="closeModalMaternityPlan()"
                class="flex-1 bg-gray-50 text-gray-600 py-4 rounded-xl font-bold hover:bg-gray-100 transition">
                CANCELAR
            </button>
        </div>
    </div>
</div>

<!-- Modal para Actualizar Estado Maternidad -->
<div id="modalUpdateMaternityStatus"
    class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[60] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-md w-full p-8 shadow-2xl border-4 border-pink-400">
        <h3 class="text-xl font-black mb-6 text-gray-800">Actualizar Estado Reproductivo</h3>

        <div class="space-y-4">
            <input type="hidden" id="selectedMaternityAnimalIdStatus">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nuevo Estado</label>
                <select id="updateMaternityStatus"
                    class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-pink-500 outline-none font-bold text-gray-700">
                    <option value="Saludable">Vacía / Disponible</option>
                    <option value="Gestante">Gestante</option>
                    <option value="Parto Reciente">Parto Reciente</option>
                    <option value="Lactancia">En Lactancia</option>
                    <option value="Secado">En Secado / Descanso</option>
                </select>
            </div>
            <p class="text-xs text-gray-500 italic">Cambiar el estado actualizará las recomendaciones mostradas.</p>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="updateMaternityState()"
                class="flex-1 bg-pink-500 text-white py-3 rounded-xl font-bold hover:bg-pink-600 shadow-lg">
                ACTUALIZAR
            </button>
            <button onclick="closeModalUpdateStatus()"
                class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold">
                VOLVER
            </button>
        </div>
    </div>
</div>
