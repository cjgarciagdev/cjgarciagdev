<!-- Modal para visualizar imágenes de razas amplificadas -->
<div id="razaLightbox"
    class="fixed inset-0 z-[9999] hidden bg-black/90 flex-col items-center justify-center p-4 backdrop-blur-sm"
    onclick="closeRazaLightbox()" style="display: none;">

    <!-- Botón Cerrar (Esquina Superior Derecha) -->
    <button onclick="closeRazaLightbox()"
        class="absolute top-6 right-6 text-white/70 hover:text-white text-5xl transition-all duration-300 z-[10000] focus:outline-none">
        <i class="fas fa-times"></i>
    </button>

    <!-- Contenedor Principal -->
    <div class="relative max-w-5xl w-full flex flex-col items-center justify-center" onclick="event.stopPropagation()">
        <!-- Marco de la Imagen -->
        <div class="bg-white p-2 rounded-2xl shadow-[0_0_50px_rgba(255,255,255,0.1)] overflow-hidden">
            <img id="razaLightboxImg" src="" alt="Raza Ampliada"
                class="max-h-[80vh] max-w-full object-contain mx-auto block rounded-lg shadow-inner">
        </div>

        <!-- Pie de Imagen (Nombre de la Raza) -->
        <div
            class="mt-6 bg-gradient-to-r from-purple-600/80 to-indigo-600/80 backdrop-blur-md px-8 py-3 rounded-full border border-white/20 shadow-2xl">
            <h3 id="razaLightboxCaption" class="text-white text-2xl font-black uppercase tracking-widest"></h3>
        </div>
    </div>
</div>
