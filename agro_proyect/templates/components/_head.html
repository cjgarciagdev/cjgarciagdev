    <!-- Custom Styles -->
    <style>
        :root {
            --primary-green: #1b4332;
            --secondary-green: #2d6a4f;
            --accent-yellow: #ffca3a;
            --premium-easing: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-speed: 0.6s;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- GLOBAL PAGE TRANSITION (CURTAIN) --- */
        #page-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-green);
            z-index: 9999;
            transform: translateY(0);
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #page-curtain.reveal {
            transform: translateY(-100%);
        }

        #page-curtain.close {
            transform: translateY(0);
            pointer-events: all;
        }

        .curtain-logo {
            color: var(--accent-yellow);
            font-size: 4rem;
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .sidebar {
            background-color: var(--primary-green);
        }

        .nav-link:hover {
            background-color: var(--secondary-green);
        }

        .active-link {
            background-color: var(--secondary-green);
            border-left: 0.3125rem solid var(--accent-yellow);
        }

        /* --- IMPROVED ANIMATIONS --- */
        .fade-in {
            animation: premiumFadeIn var(--transition-speed) var(--premium-easing) forwards;
            opacity: 0;
        }

        @keyframes premiumFadeIn {
            from {
                opacity: 0;
                transform: translateY(1.5rem) scale(0.97);
                filter: blur(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .stagger-item {
            opacity: 0;
            animation: premiumFadeIn var(--transition-speed) var(--premium-easing) forwards;
        }

        /* Generate stagger delays via utility classes if needed, or JS */

        .slide-up {
            animation: slideUp 0.7s var(--premium-easing) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(2rem);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Smooth page transitions for sidebar links */
        .nav-link {
            transition: all 0.4s var(--premium-easing);
            position: relative;
        }

        .nav-link i {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease;
        }

        .nav-link:hover i {
            transform: scale(1.25) rotate(-5deg);
        }

        /* Premium Button Transitions */
        button {
            transition: all 0.3s var(--premium-easing);
        }

        button:active {
            transform: scale(0.94);
        }

        /* Glassmorphism Hover Effects */
        .glass-hover {
            transition: all 0.4s var(--premium-easing);
        }

        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 0.4rem;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.01);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #cbd5e1, #94a3b8);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        .expanded-card {
            transform: scale(1.04) translateY(-12px) !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            z-index: 50;
        }

        .card-transition {
            transition: all 0.5s var(--premium-easing);
        }

        /* Hover lift effect for general cards */
        .hover-lift {
            transition: all 0.4s var(--premium-easing);
        }

        .hover-lift:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Input Focus Transitions */
        input,
        select,
        textarea {
            transition: all 0.3s var(--premium-easing) !important;
        }

        input:focus,
        select:focus,
        textarea:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--secondary-green) !important;
        }

        /* Table Row Transitions */
        tr {
            transition: all 0.3s var(--premium-easing);
        }

        tr:hover {
            background-color: rgba(16, 185, 129, 0.05) !important;
        }

        /* Skeleton Loading Animation */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.2s infinite linear;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Mobile Table Transformation (Premium Card Style) */
        @media (max-width: 48rem) {
            .mobile-card-table thead {
                display: none;
            }

            .mobile-card-table,
            .mobile-card-table tbody,
            .mobile-card-table tr,
            .mobile-card-table td {
                display: block;
                width: 100%;
            }

            .mobile-card-table tr {
                background: white;
                margin-bottom: 2rem;
                border-radius: 1.5rem;
                padding: 1.5rem;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
                border: 1px solid rgba(0, 0, 0, 0.05);
                transition: transform 0.3s ease;
            }

            .mobile-card-table tr:active {
                transform: scale(0.97);
            }

            .mobile-card-table td {
                text-align: right;
                padding: 0.8rem 0;
                position: relative;
                border-bottom: 1px solid #f1f5f9;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.95rem;
            }

            .mobile-card-table td:last-child {
                border-bottom: none;
                margin-top: 1.2rem;
                justify-content: center;
                background: #f8fafc;
                border-radius: 1rem;
                padding: 1.2rem;
            }

            .mobile-card-table td::before {
                content: attr(data-label);
                font-weight: 800;
                color: #94a3b8;
                text-transform: uppercase;
                font-size: 0.75rem;
                letter-spacing: 0.05em;
            }
        }

        /* Bottom Nav Styles */
        .bottom-nav {
            box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.05);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bottom-nav-item {
            color: #94a3b8;
            transition: all 0.3s var(--premium-easing);
        }

        .bottom-nav-item.active {
            color: #10b981;
        }

        .bottom-nav-item.active .indicator {
            opacity: 1;
            transform: scale(1.2);
        }

        /* Smooth Section Transitions */
        .content-section {
            transition: opacity 0.5s ease-in-out, transform 0.6s var(--premium-easing);
        }

        .scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @media (min-width: 96rem) {
            .container-xl {
                max-width: 87.5rem;
                margin-left: auto;
                margin-right: auto;
            }
        }

        /* Optimización para pantallas con poca altura vertical (Wide screens cortas) */
        @media screen and (max-height: 820px) {
            :root {
                font-size: 14px;
                /* Reduce ligeramente el tamaño base */
            }

            /* Reducir el logo del sidebar que ocupa mucho espacio */
            #sidebar img {
                height: 120px !important;
                width: 120px !important;
                margin-bottom: 0 !important;
            }

            #sidebar .p-8 {
                padding: 1rem !important;
            }

            #sidebar p.-mt-12 {
                margin-top: 0 !important;
                padding-top: 0.5rem;
            }

            /* Ajustar espacios en el Dashboard */
            main {
                padding-top: 1rem !important;
                padding-bottom: 1rem !important;
            }

            .mb-10 {
                margin-bottom: 1.5rem !important;
            }

            .grid.gap-6 {
                gap: 1rem !important;
            }

            /* Contenedores de actividad y gráficas */
            #recentActivityPanel {
                height: 460px !important;
            }

            .h-72.sm\:h-\[25rem\] {
                height: 310px !important;
            }

            /* Espaciado de navegación */
            .nav-link {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
            }

            /* Modales más compactos */
            .modal-content-wrapper .p-8,
            .modal-content-wrapper .p-10 {
                padding: 1.5rem !important;
            }
        }

        /* Optimización EXTREMA para pantallas MUY cortas (Laptops pequeñas o ventanas reducidas) */
        @media screen and (max-height: 680px) {
            :root {
                font-size: 13.3px !important;
            }

            #sidebar img {
                height: 75px !important;
                width: 75px !important;
            }

            #sidebar .p-8 {
                padding: 0.6rem !important;
            }

            #sidebar p.-mt-12,
            #sidebar .text-\[0\.625rem\] {
                display: block !important;
                margin-top: -0.4rem !important;
                font-size: 0.55rem !important;
                opacity: 0.5;
            }

            nav.mt-6 {
                margin-top: 0.65rem !important;
            }

            .nav-link {
                padding-top: 0.35rem !important;
                padding-bottom: 0.35rem !important;
                font-size: 0.85rem !important;
            }

            main {
                padding: 1.2rem 2rem !important;
            }

            h1,
            .text-3xl {
                font-size: 1.65rem !important;
            }

            .mb-10 {
                margin-bottom: 0.65rem !important;
            }

            #recentActivityPanel {
                height: 380px !important;
            }

            .h-72.sm\:h-\[25rem\] {
                height: 260px !important;
            }

            .grid.gap-6 {
                gap: 0.75rem !important;
            }

            .p-6 {
                padding: 1rem !important;
            }
        }
    </style>
