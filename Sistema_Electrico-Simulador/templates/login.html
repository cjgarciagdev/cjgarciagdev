<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Monitoreo Eléctrico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/font-awesome.min.css') }}">
    <style>
        .login-logo {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .login-title {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            color: var(--dark);
            text-align: center;
            font-weight: 700;
        }

        .login-subtitle {
            color: var(--slate);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="login-header"
                style="border-bottom: 2px solid var(--primary); padding-bottom: 2rem; margin-bottom: 2rem;">
                <div class="login-logo"
                    style="background: var(--primary); color: white; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 20px; margin: 0 auto 1.5rem; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1 class="login-title" style="letter-spacing: -1px; text-transform: uppercase; font-size: 1.5rem;">
                    Gestión Energética</h1>
                <p class="login-subtitle"
                    style="font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem;">Centro
                    de Operaciones de Red</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="label">Nombre de Usuario</label>
                    <input type="text" id="username" class="input" required placeholder="admin">
                </div>

                <div class="form-group">
                    <label class="label">Contraseña</label>
                    <input type="password" id="password" class="input" required placeholder="••••••••">
                </div>

                <div id="errorMessage" class="hidden"
                    style="color: var(--falla-alto-voltaje); font-size: 0.8rem; margin-bottom: 1rem; text-align: center;">
                    <i class="fas fa-exclamation-triangle"></i> Credenciales inválidas
                </div>

                <button type="submit" class="btn btn-primary w-full" style="justify-content: center; height: 50px;">
                    Entrar al Sistema
                </button>
            </form>

            <div
                style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; text-align: center;">
                <p style="font-size: 0.75rem; color: var(--slate);">
                    Admin: admin / Clave: admin123
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });
    </script>
</body>

</html>
