<!-- MODAL: MOVIMIENTO FINANCIERO -->
<div id="modalFinanza"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto animate-slide-in">
        <div class="sticky top-0 bg-gradient-to-r from-emerald-500 to-green-700 p-6 rounded-t-3xl">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-black text-white"><i class="fas fa-dollar-sign mr-2"></i>Movimiento Financiero
                </h3>
                <button onclick="closeModalFinanza()" class="text-white/80 hover:text-white transition text-2xl"><i
                        class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Tipo *</label>
                    <select id="finTipo" onchange="updateFinCategorias()"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                        <option value="Ingreso">Ingreso</option>
                        <option value="Gasto">Gasto</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Categoría *</label>
                    <select id="finCategoria"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                        <option value="">Seleccionar...</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Monto *</label>
                    <input type="number" step="0.01" id="finMonto" placeholder="0.00"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Moneda</label>
                    <select id="finMoneda"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                        <option value="USD">USD ($)</option>
                        <option value="BS">Bolívares (Bs)</option>
                        <option value="COP">Pesos (COP)</option>
                        <option value="EUR">Euros (€)</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">Descripción</label>
                <input type="text" id="finDescripcion" placeholder="Detalle del movimiento..."
                    class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Proveedor / Cliente</label>
                    <input type="text" id="finProveedorCliente" placeholder="Nombre..."
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Nº Factura</label>
                    <input type="text" id="finFactura" placeholder="Opcional"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Fecha</label>
                    <input type="datetime-local" id="finFecha"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Estado</label>
                    <select id="finEstado"
                        class="w-full p-3 border rounded-xl bg-gray-50 focus:border-emerald-500 outline-none">
                        <option value="Completado">Completado</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
            </div>
            <button onclick="saveFinanza()"
                class="w-full bg-gradient-to-r from-emerald-500 to-green-700 text-white py-3 rounded-2xl font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-0.5">
                <i class="fas fa-save mr-2"></i>Guardar Movimiento
            </button>
        </div>
    </div>
</div>
