<!-- Header de Análisis Avanzado -->
<div class="mb-8">
    <div class="flex items-center gap-4 mb-2">
        <div
            class="bg-gradient-to-br from-purple-600 to-indigo-800 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
            <i class="fas fa-brain text-white text-2xl"></i>
        </div>
        <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">Análisis Avanzado</h2>
    </div>
    <p class="text-gray-500 ml-16">Análisis genealógico y genético basado en teoría de grafos y circuitos
        lógicos</p>
</div>

<!-- Selector de Animal -->
<div class="mb-8 bg-white p-6 rounded-3xl shadow-sm border border-purple-100">
    <div class="flex flex-col md:flex-row justify-between items-end gap-4">
        <div class="flex-grow w-full">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                <i class="fas fa-search mr-2 text-purple-500"></i>Sujeto de Análisis
            </label>
            <select id="selectAnimalAnalisis" onchange="cargarAnalisisCompleto()"
                class="w-full bg-gray-50 p-4 rounded-xl border-transparent focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none font-bold text-gray-700 transition appearance-none cursor-pointer">
                <option value="">Seleccionar del rebaño...</option>
            </select>
        </div>
        <button onclick="openModalGenealogia()"
            class="w-full md:w-auto bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-purple-200 transition transform hover:-translate-y-1 flex items-center justify-center gap-2">
            <i class="fas fa-project-diagram"></i>
            <span>Configurar Genealogía</span>
        </button>
    </div>
</div>

<!-- Tabs de Análisis -->
<div class="mb-6">
    <div class="flex overflow-x-auto custom-scrollbar gap-2 border-b-2 border-gray-100">
        <button onclick="cambiarTabAnalisis('genealogia')" id="tab-genealogia"
            class="tab-analisis whitespace-nowrap px-6 py-3 font-bold text-purple-600 border-b-4 border-purple-600 bg-purple-50 rounded-t-xl transition">
            <i class="fas fa-sitemap mr-2"></i>Grafo Genealógico
        </button>

        <button onclick="cambiarTabAnalisis('metricas')" id="tab-metricas"
            class="tab-analisis whitespace-nowrap px-6 py-3 font-bold text-gray-500 hover:bg-gray-50 rounded-t-xl transition">
            <i class="fas fa-chart-line mr-2"></i>Métricas y Score
        </button>

        <button onclick="cambiarTabAnalisis('rutas')" id="tab-rutas"
            class="tab-analisis whitespace-nowrap px-6 py-3 font-bold text-gray-500 hover:bg-gray-50 rounded-t-xl transition">
            <i class="fas fa-route mr-2"></i>Buscador de Rutas
        </button>
    </div>
</div>
