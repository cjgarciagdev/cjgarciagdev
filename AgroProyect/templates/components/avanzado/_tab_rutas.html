<!-- Buscador de Rutas Genealógicas -->
<div id="content-rutas" class="tab-content-analisis hidden">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-teal-100 relative overflow-hidden">
            <!-- Decoración de fondo -->
            <div class="absolute top-0 right-0 -mt-8 -mr-8 w-32 h-32 bg-teal-50 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 -mb-8 -ml-8 w-32 h-32 bg-blue-50 rounded-full blur-3xl"></div>

            <div class="relative z-10 text-center mb-8">
                <span class="inline-block p-3 bg-teal-100 text-teal-600 rounded-2xl mb-4">
                    <i class="fas fa-route text-2xl"></i>
                </span>
                <h4 class="text-3xl font-black text-gray-800 tracking-tight">Buscador de Rutas</h4>
                <p class="text-gray-500 max-w-md mx-auto">Descubre el camino genético y la relación jerárquica entre dos
                    animales cualesquiera de tu rebaño.</p>
            </div>

            <!-- Panel de Selección -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-center mb-8">
                <div class="md:col-span-5">
                    <label class="block text-[0.625rem] font-black text-teal-600 uppercase tracking-widest mb-2 ml-4">Animal
                        Origen</label>
                    <div class="relative group">
                        <select id="camino-origen"
                            class="w-full bg-gray-50 p-4 pl-12 rounded-2xl border-2 border-transparent focus:border-teal-500 focus:bg-white outline-none font-bold text-gray-700 transition appearance-none cursor-pointer">
                            <option value="">Seleccionar inicio...</option>
                        </select>
                        <i class="fas fa-play-circle absolute left-4 top-1/2 -translate-y-1/2 text-teal-400"></i>
                    </div>
                </div>

                <div class="md:col-span-2 flex justify-center">
                    <div
                        class="bg-teal-50 w-12 h-12 rounded-full flex items-center justify-center text-teal-500 shadow-inner group transition-transform hover:rotate-180">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                </div>

                <div class="md:col-span-5">
                    <label class="block text-[0.625rem] font-black text-blue-600 uppercase tracking-widest mb-2 ml-4">Animal
                        Destino</label>
                    <div class="relative group">
                        <select id="camino-destino"
                            class="w-full bg-gray-50 p-4 pl-12 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-bold text-gray-700 transition appearance-none cursor-pointer">
                            <option value="">Seleccionar fin...</option>
                        </select>
                        <i class="fas fa-flag-checkered absolute left-4 top-1/2 -translate-y-1/2 text-blue-400"></i>
                    </div>
                </div>
            </div>

            <button onclick="buscarCamino()"
                class="w-full bg-gradient-to-r from-teal-600 to-blue-600 hover:from-teal-700 hover:to-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-teal-100 transition transform hover:-translate-y-1 flex items-center justify-center gap-3">
                <i class="fas fa-project-diagram"></i>
                <span>CALCULAR RUTA GENÉTICA</span>
            </button>
        </div>

        <!-- Resultados -->
        <div id="camino-resultado" class="mt-8">
            <!-- Se llenará vía JS -->
            <div class="text-center py-12 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                    <i class="fas fa-search-location text-gray-300 text-2xl"></i>
                </div>
                <p class="text-gray-400 font-bold">Esperando parámetros de búsqueda...</p>
                <p class="text-[0.625rem] text-gray-400 uppercase tracking-widest mt-2">Selecciona los animales para iniciar
                    el análisis</p>
            </div>
        </div>
    </div>
</div>
