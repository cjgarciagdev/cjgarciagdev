<!-- SECCIÓN: CALENDARIO DE ACTIVIDADES -->
<section id="sec-calendario" class="content-section hidden fade-in">
    <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="flex items-center gap-4 mb-2">
                <div
                    class="bg-gradient-to-br from-indigo-500 to-purple-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
                    <i class="fas fa-calendar-alt text-white text-2xl"></i>
                </div>
                <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">Calendario de Actividades</h2>
            </div>
            <p class="text-gray-500 ml-16">Panel unificado de tareas, protocolos y alertas establecidas</p>
        </div>
        <!-- Opción de creación deshabilitada para mantener foco en visualización de módulos -->
    </div>

    <!-- Resumen -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-indigo-100 flex items-center gap-4">
            <div class="bg-indigo-50 p-3 rounded-2xl">
                <i class="fas fa-calendar-check text-indigo-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase">Este Mes</p>
                <h3 class="text-2xl font-black text-gray-800" id="cal-total-mes">0</h3>
            </div>
        </div>
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-green-100 flex items-center gap-4">
            <div class="bg-green-50 p-3 rounded-2xl">
                <i class="fas fa-check-circle text-green-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase">Completados</p>
                <h3 class="text-2xl font-black text-green-700" id="cal-completados">0</h3>
            </div>
        </div>
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-yellow-100 flex items-center gap-4">
            <div class="bg-yellow-50 p-3 rounded-2xl">
                <i class="fas fa-hourglass-half text-yellow-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase">Pendientes</p>
                <h3 class="text-2xl font-black text-yellow-700" id="cal-pendientes">0</h3>
            </div>
        </div>
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-red-100 flex items-center gap-4">
            <div class="bg-red-50 p-3 rounded-2xl">
                <i class="fas fa-exclamation-circle text-red-600 text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase">Vencidos Hoy</p>
                <h3 class="text-2xl font-black text-red-700" id="cal-vencidos">0</h3>
            </div>
        </div>
    </div>

    <!-- Calendario Visual + Lista de Próximos -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Calendario Principal -->
        <div class="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <div class="flex justify-between items-center mb-6">
                <button onclick="cambiarMesCalendario(-1)" class="p-2 hover:bg-gray-100 rounded-xl transition">
                    <i class="fas fa-chevron-left text-gray-600"></i>
                </button>
                <h3 class="text-xl font-black text-gray-800" id="cal-mes-titulo">Enero 2025</h3>
                <button onclick="cambiarMesCalendario(1)" class="p-2 hover:bg-gray-100 rounded-xl transition">
                    <i class="fas fa-chevron-right text-gray-600"></i>
                </button>
            </div>
            <!-- Días de la semana -->
            <div class="grid grid-cols-7 gap-1 mb-2">
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Lun</div>
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Mar</div>
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Mié</div>
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Jue</div>
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Vie</div>
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Sáb</div>
                <div class="text-center text-xs font-bold text-gray-400 uppercase py-2">Dom</div>
            </div>
            <!-- Grid de días -->
            <div class="grid grid-cols-7 gap-1" id="cal-grid">
                <!-- Se llena por JS -->
            </div>
        </div>

        <!-- Próximos Eventos -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-clock text-indigo-500 mr-2"></i>Próximos 7 Días
            </h3>
            <div id="proximos-eventos" class="space-y-3" style="max-height: 500px; overflow-y: auto;">
                <p class="text-gray-400 text-sm text-center py-8">Cargando eventos...</p>
            </div>
        </div>
    </div>
</section>
