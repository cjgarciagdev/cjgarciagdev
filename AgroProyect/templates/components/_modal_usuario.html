<!-- Modal Usuario -->
<div id="modalUser" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
        class="bg-white rounded-[2.5rem] max-w-lg w-full max-h-[90vh] overflow-y-auto p-8 shadow-2xl animate-scaleIn modal-content-wrapper">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-user-circle text-2xl"></i>
                </div>
                <h3 id="modalUserTitle" class="text-2xl font-black text-gray-800 tracking-tight">Nuevo Usuario</h3>
            </div>
            <button onclick="closeUserModal()" class="text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>

        <form id="formUsuario" onsubmit="event.preventDefault(); saveUser();" class="space-y-5">
            <input type="hidden" id="usr-id">

            <div class="space-y-2">
                <label class="text-[0.625rem] font-black text-gray-400 uppercase tracking-widest ml-1">Nombre
                    Completo</label>
                <div class="relative">
                    <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="text" id="usr-nombre" required
                        class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition font-bold text-gray-700"
                        placeholder="Ej. Juan Pérez">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label
                        class="text-[0.625rem] font-black text-gray-400 uppercase tracking-widest ml-1">Username</label>
                    <div class="relative">
                        <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="text" id="usr-username" required
                            class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition font-bold text-gray-700"
                            placeholder="juan.v">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[0.625rem] font-black text-gray-400 uppercase tracking-widest ml-1">Rol</label>
                    <select id="usr-rol"
                        class="w-full px-4 py-4 bg-gray-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition font-bold text-gray-700 cursor-pointer">
                        <option value="operador">Operador (Campo)</option>
                        <option value="veterinario">Veterinario</option>
                        <option value="nutricionista">Nutricionista</option>
                        <option value="inventario">Encargado Inventario</option>
                        <option value="gerente">Gerente / Dueño</option>
                        <option value="auditor">Auditor Externo</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[0.625rem] font-black text-gray-400 uppercase tracking-widest ml-1">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                    <input type="email" id="usr-email" required
                        class="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition font-bold text-gray-700"
                        placeholder="juan@ejemplo.com">
                </div>
            </div>

            <div id="password-field" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-[0.625rem] font-black text-gray-400 uppercase tracking-widest ml-1">Contraseña
                        Inicial</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="password" id="usr-password"
                            class="w-full pl-12 pr-12 py-4 bg-gray-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition font-bold text-gray-700"
                            placeholder="••••••••">
                        <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 cursor-pointer hover:text-indigo-600 transition"
                            onclick="toggleModalPassword()"></i>
                    </div>
                    <p class="text-[0.5625rem] text-gray-400 italic">El usuario deberá cambiarla en su primer acceso.
                    </p>
                </div>

                <!-- PREGUNTAS DE SEGURIDAD -->
                <div class="bg-indigo-50/50 rounded-2xl p-4 space-y-4 border border-indigo-100">
                    <p class="text-[0.625rem] font-black text-indigo-400 uppercase tracking-widest mb-2">Preguntas de
                        Seguridad (Se recomiendan 5 para aleatoriedad)</p>

                    <div class="space-y-2">
                        <select
                            class="usr-q w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-gray-700 outline-none">
                            <option value="">-- Seleccionar Pregunta 1 --</option>
                            <option value="¿Cuál es el nombre de tu primera mascota?">¿Cuál es el nombre de tu primera
                                mascota?</option>
                            <option value="¿Cuál es el nombre de tu escuela primaria?">¿Cuál es el nombre de tu escuela
                                primaria?</option>
                            <option value="¿En qué ciudad naciste?">¿En qué ciudad naciste?</option>
                            <option value="¿Cuál es tu comida favorita?">¿Cuál es tu comida favorita?</option>
                            <option value="¿Cuál es el nombre de tu abuelo materno?">¿Cuál es el nombre de tu abuelo
                                materno?</option>
                            <option value="¿Cuál es el nombre de tu primer jefe?">¿Cuál es el nombre de tu primer jefe?
                            </option>
                        </select>
                        <input type="text"
                            class="usr-a w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-medium text-gray-700 outline-none"
                            placeholder="Respuesta 1">
                    </div>

                    <div class="space-y-2">
                        <select
                            class="usr-q w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-gray-700 outline-none">
                            <option value="">-- Seleccionar Pregunta 2 --</option>
                            <option value="¿Cuál es tu color favorito?">¿Cuál es tu color favorito?</option>
                            <option value="¿Cuál fue tu primer carro?">¿Cuál fue tu primer carro?</option>
                            <option value="¿Cómo se llamaba tu mejor amigo de la infancia?">¿Cómo se llamaba tu mejor
                                amigo de la infancia?</option>
                            <option value="¿Cuál es tu película favorita?">¿Cuál es tu película favorita?</option>
                            <option value="¿Cuál es el nombre de tu canción favorita?">¿Cuál es el nombre de tu canción
                                favorita?</option>
                            <option value="¿Cuál es el nombre de tu actor favorito?">¿Cuál es el nombre de tu actor
                                favorito?</option>
                        </select>
                        <input type="text"
                            class="usr-a w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-medium text-gray-700 outline-none"
                            placeholder="Respuesta 2">
                    </div>

                    <div class="space-y-2">
                        <select
                            class="usr-q w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-gray-700 outline-none">
                            <option value="">-- Seleccionar Pregunta 3 --</option>
                            <option value="¿Qué deporte prefieres?">¿Qué deporte prefieres?</option>
                            <option value="¿Cuál era el nombre de tu mascota favorita?">¿Cuál era el nombre de tu
                                mascota favorita?</option>
                            <option value="¿Dónde fueron tus vacaciones favoritas?">¿Dónde fueron tus vacaciones
                                favoritas?</option>
                            <option value="¿Cuál es tu pasatiempo favorito?">¿Cuál es tu pasatiempo favorito?</option>
                            <option value="¿Cuál es el nombre de la calle donde creciste?">¿Cuál es el nombre de la
                                calle donde creciste?</option>
                            <option value="¿Cómo se llama tu libro favorito?">¿Cómo se llama tu libro favorito?</option>
                        </select>
                        <input type="text"
                            class="usr-a w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-medium text-gray-700 outline-none"
                            placeholder="Respuesta 3">
                    </div>

                    <div class="space-y-2">
                        <select
                            class="usr-q w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-gray-700 outline-none">
                            <option value="">-- Seleccionar Pregunta 4 --</option>
                            <option value="¿Cuál fue tu primer trabajo?">¿Cuál fue tu primer trabajo?</option>
                            <option value="¿Cuál es tu destino de viaje soñado?">¿Cuál es tu destino de viaje soñado?
                            </option>
                            <option value="¿Cómo se llamaba tu primera profesora?">¿Cómo se llamaba tu primera
                                profesora?</option>
                            <option value="¿Cuál es tu marca de café favorita?">¿Cuál es tu marca de café favorita?
                            </option>
                            <option value="¿En qué mes nacieron tus padres?">¿En qué mes nacieron tus padres?</option>
                            <option value="¿Cuál es el nombre de tu primer sobrino?">¿Cuál es el nombre de tu primer
                                sobrino?</option>
                        </select>
                        <input type="text"
                            class="usr-a w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-medium text-gray-700 outline-none"
                            placeholder="Respuesta 4">
                    </div>

                    <div class="space-y-2">
                        <select
                            class="usr-q w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-gray-700 outline-none">
                            <option value="">-- Seleccionar Pregunta 5 --</option>
                            <option value="¿Cuál es tu equipo de fútbol favorito?">¿Cuál es tu equipo de fútbol
                                favorito?</option>
                            <option value="¿Cuál fue el primer concierto al que asististe?">¿Cuál fue el primer
                                concierto al que asististe?</option>
                            <option value="¿Cuál era el nombre de tu primer vecino?">¿Cuál era el nombre de tu primer
                                vecino?</option>
                            <option value="¿Cuál es tu postre preferido?">¿Cuál es tu postre preferido?</option>
                            <option value="¿Cómo se llamaba tu juguete favorito?">¿Cómo se llamaba tu juguete favorito?
                            </option>
                            <option value="¿Cuál es el nombre de tu restaurante favorito?">¿Cuál es el nombre de tu
                                restaurante favorito?</option>
                        </select>
                        <input type="text"
                            class="usr-a w-full px-3 py-2 bg-white border border-indigo-100 rounded-xl text-sm font-medium text-gray-700 outline-none"
                            placeholder="Respuesta 5">
                    </div>
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="button" onclick="closeUserModal()"
                    class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-black hover:bg-gray-200 transition active:scale-95">
                    CANCELAR
                </button>
                <button type="submit"
                    class="flex-2 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 hover:brightness-110 transition active:scale-95">
                    GUARDAR USUARIO
                </button>
            </div>
        </form>
    </div>
</div>
