<!-- SECCIÓN: MÓDULO FINANCIERO -->
<section id="sec-finanzas" class="content-section hidden fade-in">
    <div class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <div class="flex items-center gap-4 mb-2">
                <div
                    class="bg-gradient-to-br from-emerald-500 to-green-700 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
                    <i class="fas fa-dollar-sign text-white text-2xl"></i>
                </div>
                <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">Módulo Financiero</h2>
            </div>
            <p class="text-gray-500 ml-16">Control de ingresos, gastos y balance general</p>
        </div>
        <button onclick="openModalFinanza()"
            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-emerald-200 transition transform hover:-translate-y-1 flex items-center">
            <i class="fas fa-plus mr-2"></i> Nuevo Movimiento
        </button>
    </div>

    <!-- Resumen Financiero -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="finanzas-stats">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-100">
            <div class="flex items-center gap-3 mb-3">
                <div class="bg-green-50 p-3 rounded-2xl">
                    <i class="fas fa-arrow-down text-green-600 text-lg"></i>
                </div>
                <span class="text-xs font-bold text-gray-400 uppercase">Ingresos (Mes)</span>
            </div>
            <h3 class="text-3xl font-black text-green-700" id="fin-ingresos-mes">$0.00</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-red-100">
            <div class="flex items-center gap-3 mb-3">
                <div class="bg-red-50 p-3 rounded-2xl">
                    <i class="fas fa-arrow-up text-red-600 text-lg"></i>
                </div>
                <span class="text-xs font-bold text-gray-400 uppercase">Gastos (Mes)</span>
            </div>
            <h3 class="text-3xl font-black text-red-700" id="fin-gastos-mes">$0.00</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
            <div class="flex items-center gap-3 mb-3">
                <div class="bg-blue-50 p-3 rounded-2xl">
                    <i class="fas fa-balance-scale text-blue-600 text-lg"></i>
                </div>
                <span class="text-xs font-bold text-gray-400 uppercase">Balance (Mes)</span>
            </div>
            <h3 class="text-3xl font-black" id="fin-balance-mes">$0.00</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-yellow-100">
            <div class="flex items-center gap-3 mb-3">
                <div class="bg-yellow-50 p-3 rounded-2xl">
                    <i class="fas fa-clock text-yellow-600 text-lg"></i>
                </div>
                <span class="text-xs font-bold text-gray-400 uppercase">Pendientes</span>
            </div>
            <h3 class="text-3xl font-black text-yellow-700" id="fin-pendientes">$0.00</h3>
        </div>
    </div>

    <!-- Gráficos -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <!-- Flujo de Caja (12 meses) -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-chart-bar text-emerald-500 mr-2"></i>Flujo de Caja
                (12 meses)</h3>
            <div class="h-[320px] w-full relative">
                <canvas id="chartFlujoCaja"></canvas>
            </div>
        </div>
        <!-- Distribución de Gastos -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
            <h3 class="font-bold text-gray-700 mb-4"><i class="fas fa-chart-pie text-red-500 mr-2"></i>Distribución de
                Gastos</h3>
            <div class="h-[320px] w-full relative">
                <canvas id="chartGastos"></canvas>
            </div>
        </div>
    </div>

    <!-- Tabla de Movimientos -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
        <div
            class="p-6 border-b border-gray-100 bg-gray-50/50 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-wrap gap-2">
                <button onclick="filterFinanzas('todos')" data-ftipo="todos"
                    class="filter-btn-fin px-4 py-2 rounded-xl text-sm font-bold bg-emerald-600 text-white border border-emerald-600 transition">Todos</button>
                <button onclick="filterFinanzas('Ingreso')" data-ftipo="Ingreso"
                    class="filter-btn-fin px-4 py-2 rounded-xl text-sm font-bold bg-white border border-gray-200 text-gray-600 hover:bg-green-50 transition">Ingresos</button>
                <button onclick="filterFinanzas('Gasto')" data-ftipo="Gasto"
                    class="filter-btn-fin px-4 py-2 rounded-xl text-sm font-bold bg-white border border-gray-200 text-gray-600 hover:bg-red-50 transition">Gastos</button>
            </div>
            <div class="flex gap-2">
                <input type="date" id="fin-fecha-desde" class="text-sm border rounded-xl px-3 py-1.5 bg-white"
                    onchange="loadFinanzasRegistros()">
                <input type="date" id="fin-fecha-hasta" class="text-sm border rounded-xl px-3 py-1.5 bg-white"
                    onchange="loadFinanzasRegistros()">
            </div>
        </div>
        <div class="overflow-x-auto" style="max-height: 500px; overflow-y: auto;">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b sticky top-0">
                    <tr>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Fecha</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Tipo</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Categoría</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Monto</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Descripción</th>
                        <th class="p-4 text-xs font-bold text-gray-400 uppercase">Estado</th>
                        <th class="p-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="finanzasTableBody"></tbody>
            </table>
        </div>
    </div>
</section>
