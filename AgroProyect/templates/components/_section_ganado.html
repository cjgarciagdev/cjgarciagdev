<section id="sec-ganado" class="content-section hidden fade-in">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div>
            <div class="flex items-center gap-4 mb-2">
                <div
                    class="bg-gradient-to-br from-green-500 to-emerald-700 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
                    <i class="fas fa-cow text-white text-2xl"></i>
                </div>
                <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">Inventario de Animales</h2>
            </div>
            <p class="text-gray-500 ml-16">Gestión detallada del rebaño y producción</p>
        </div>

        {% if has_perm('crear_animales') %}
        <button onclick="openModal()"
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-green-200 transition transform hover:-translate-y-1 flex items-center">
            <i class="fas fa-plus mr-2"></i> Nuevo Ejemplar
        </button>
        {% endif %}
    </div>
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border"
        style="height: calc(100vh - 13.75rem); overflow-y: auto;">
        <div
            class="p-4 flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-50 border-b sticky top-0 z-10">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-64 group">
                    <input type="text" id="searchInput" onkeyup="filterAnimals()" placeholder="Buscar ID o Raza..."
                        class="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-100 outline-none transition text-sm">
                    <i
                        class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-green-500 transition"></i>
                </div>
                <select id="filterSpecies" onchange="filterAnimals()"
                    class="p-2 py-2 rounded-xl border border-gray-200 focus:border-green-500 outline-none text-sm bg-white cursor-pointer hover:bg-gray-50">
                    <option value="all">Todas las Especies</option>
                    <option value="Bovino">Bovino</option>
                    <option value="Ovino">Ovino</option>
                    <option value="Caprino">Caprino</option>
                    <option value="Porcino">Porcino</option>
                    <option value="Equino">Equino</option>
                    <option value="Otro">Otro</option>
                </select>
                <select id="filterHealth" onchange="filterAnimals()"
                    class="p-2 py-2 rounded-xl border border-gray-200 focus:border-red-500 outline-none text-sm bg-white cursor-pointer hover:bg-red-50 text-gray-700 font-medium">
                    <option value="all">Todos los Estados</option>
                    <option value="critical" class="text-red-600 font-bold">Salud Crítica / Riesgo</option>
                    <option value="nutrition" class="text-green-600 font-bold">Planes Nutricionales Activos</option>
                </select>
            </div>

            <!-- Export buttons removed by user request -->
        </div>
        <table class="w-full text-left mobile-card-table">
            <thead class="bg-gray-50 border-b">
                <tr>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">ID</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Especie</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Raza</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Sexo</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Edad (M)</th>
                    <th class="p-4 text-xs font-bold text-gray-400 uppercase">Peso</th>
                    <th class="p-4 text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="animalTableBody"></tbody>
        </table>
    </div>
</section>
