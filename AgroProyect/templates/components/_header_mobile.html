<!-- Mobile Header -->
<header
    class="lg:hidden bg-white/80 backdrop-blur-md shadow-sm p-4 flex justify-between items-center fixed w-full z-30 top-0 left-0 border-b border-gray-100">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center shadow-sm">
            <i class="fas fa-seedling text-green-700 text-xl"></i>
        </div>
        <div>
            <span class="block font-black text-green-900 text-lg leading-none tracking-tighter">AGRO-MASTER</span>
            <span class="text-[0.5625rem] text-green-600/70 font-bold uppercase tracking-widest">Gestión Inteligente</span>
        </div>
    </div>
    <button onclick="toggleSidebar()"
        class="text-gray-600 focus:outline-none p-3 rounded-2xl hover:bg-gray-100/50 transition-all active:scale-90">
        <i class="fas fa-bars text-xl"></i>
    </button>
</header>

<!-- Overlay for Mobile -->
<div id="sidebarOverlay" onclick="toggleSidebar()"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden transition-opacity opacity-0 lg:hidden">
