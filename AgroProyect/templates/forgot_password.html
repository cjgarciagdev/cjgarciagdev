<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRO-MASTER | Recuperar Contraseña</title>
    <script src="{{ url_for('static', filename='vendor/tailwindcss.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/fontawesome.js') }}"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #34d399;
            --dark: #064e3b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #064e3b;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(52, 211, 153, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
            padding: 1.25rem 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(1.25rem);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
            outline: none;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.5);
            filter: brightness(1.1);
        }

        .step-indicator {
            width: 2rem;
            height: 0.375rem;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .step-indicator.active {
            background: var(--primary);
            width: 3rem;
        }

        /* --- TRANSITIONS --- */
        #page-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1b4332;
            z-index: 9999;
            transform: translateY(0);
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #page-curtain.reveal {
            transform: translateY(-100%);
        }

        .curtain-logo {
            color: #ffca3a;
            font-size: 4rem;
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .stagger-item {
            opacity: 0;
            animation: premiumFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes premiumFadeIn {
            from {
                opacity: 0;
                transform: translateY(1.5rem) scale(0.97);
                filter: blur(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .loader {
            width: 1.25rem;
            height: 1.25rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- Page Transition Curtain -->
    <div id="page-curtain">
        <div class="flex flex-col items-center">
            <i class="fas fa-seedling curtain-logo"></i>
            <span class="text-white font-black tracking-widest mt-4" id="curtain-text">SINCRONIZANDO...</span>
        </div>
    </div>

    <div class="glass-card p-8 md:p-10 m-4 stagger-item">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-emerald-500/20">
                <i class="fas fa-shield-alt text-4xl text-emerald-400"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">Recuperar Acceso</h1>
            <p class="text-gray-400 text-sm">Sigue los pasos para restablecer tu cuenta</p>
        </div>

        <div class="flex justify-center gap-2 mb-10 stagger-item" style="animation-delay: 0.1s;">
            <div id="ind-1" class="step-indicator active"></div>
            <div id="ind-2" class="step-indicator"></div>
            <div id="ind-3" class="step-indicator"></div>
        </div>

        <!-- Step 1 -->
        <div id="step-1" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Usuario</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="username"
                        class="input-field w-full pl-12 pr-4 py-4 rounded-2xl font-semibold"
                        placeholder="Tu nombre de usuario">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Correo
                    Electrónico</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="email" id="email" class="input-field w-full pl-12 pr-4 py-4 rounded-2xl font-semibold"
                        placeholder="ejemplo@agro.com">
                </div>
            </div>
            <button onclick="identifyUser()"
                class="btn-premium w-full py-4 rounded-2xl text-white font-extrabold text-lg flex items-center justify-center gap-3">
                <span id="btn-text-1">Verificar Identidad</span>
                <div id="loader-1" class="loader"></div>
            </button>
        </div>

        <!-- Step 2 -->
        <div id="step-2" class="hidden space-y-6">
            <div id="questions-container" class="space-y-6"></div>
            <button onclick="nextToStep3()"
                class="btn-premium w-full py-4 rounded-2xl text-white font-extrabold text-lg mt-8">Siguiente
                Paso</button>
        </div>

        <!-- Step 3 -->
        <div id="step-3" class="hidden space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Nueva
                    Contraseña</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="new_password"
                        class="input-field w-full pl-12 pr-12 py-4 rounded-2xl font-semibold" placeholder="••••••••">
                    <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer hover:text-emerald-400 transition"
                        onclick="togglePassword('new_password', this)"></i>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Confirmar
                    Contraseña</label>
                <div class="relative">
                    <i class="fas fa-check-circle absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="confirm_password"
                        class="input-field w-full pl-12 pr-12 py-4 rounded-2xl font-semibold" placeholder="••••••••">
                    <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer hover:text-emerald-400 transition"
                        onclick="togglePassword('confirm_password', this)"></i>
                </div>
            </div>
            <button onclick="resetPassword()"
                class="btn-premium w-full py-4 rounded-2xl text-white font-extrabold text-lg flex items-center justify-center gap-3">
                <span id="btn-text-3">Restablecer Todo</span>
                <div id="loader-3" class="loader"></div>
            </button>
        </div>

        <!-- Step Success -->
        <div id="step-success" class="hidden text-center">
            <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-8">
                <i class="fas fa-check text-4xl text-emerald-400"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-4">¡Todo listo!</h2>
            <p class="text-gray-400 mb-8">Tu contraseña ha sido actualizada con éxito.</p>
            <a href="/login"
                class="btn-premium block w-full py-4 rounded-2xl text-white font-extrabold text-lg text-center no-underline">Iniciar
                Sesión</a>
        </div>

        <div class="mt-10 text-center">
            <a href="/login"
                class="text-emerald-400 hover:text-emerald-300 transition text-sm font-bold flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left text-[0.625rem]"></i> Volver al inicio
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const curtain = document.getElementById('page-curtain');
            setTimeout(() => { if (curtain) curtain.classList.add('reveal'); }, 800);
        });

        let userData = { username: '', email: '', questions: [], answers: {} };

        function showLoader(step, show) {
            document.getElementById(`loader-${step}`).style.display = show ? 'block' : 'none';
            document.getElementById(`btn-text-${step}`).style.display = show ? 'none' : 'block';
        }

        function switchStep(from, to) {
            document.getElementById(`step-${from}`).classList.add('hidden');
            const toEl = document.getElementById(`step-${to}`);
            toEl.classList.remove('hidden');
            toEl.style.opacity = '0';
            setTimeout(() => { toEl.style.opacity = '1'; toEl.style.transition = 'opacity 0.5s ease'; }, 50);

            if (typeof to === 'number' || !isNaN(to)) {
                const stepNum = parseInt(to);
                for (let i = 1; i <= 3; i++) {
                    document.getElementById(`ind-${i}`).classList.toggle('active', i === stepNum);
                    if (i < stepNum) document.getElementById(`ind-${i}`).style.background = '#34d399';
                }
            }
        }

        async function identifyUser() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            if (!username || !email) { alert('Por favor completa todos los campos'); return; }

            showLoader(1, true);
            try {
                const res = await fetch('/api/auth/identify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    userData.username = username;
                    userData.email = email;
                    userData.questions = data.questions;
                    renderQuestions(data.questions);
                    switchStep(1, 2);
                } else { alert(data.error || 'Error al identificar usuario'); }
            } catch (e) { alert('Error de conexión'); }
            finally { showLoader(1, false); }
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '<p class="text-amber-400 text-xs font-bold bg-amber-400/10 p-3 rounded-xl border border-amber-400/20 mb-4">Verificado. Responde tus preguntas:</p>';
            questions.forEach((q, idx) => {
                container.innerHTML += `
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Pregunta ${idx + 1}</label>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5 mb-2"><p class="text-white font-bold">${q.text}</p></div>
                        <input type="text" data-qid="${q.id}" class="q-answer input-field w-full px-4 py-4 rounded-2xl font-semibold" placeholder="Tu respuesta">
                    </div>`;
            });
        }

        function nextToStep3() {
            const answers = {}; let complete = true;
            document.querySelectorAll('.q-answer').forEach(input => {
                const qid = input.getAttribute('data-qid');
                if (!input.value.trim()) complete = false;
                answers[qid] = input.value.trim();
            });
            if (!complete) { alert('Responde todas las preguntas'); return; }
            userData.answers = answers;
            switchStep(2, 3);
        }

        async function resetPassword() {
            const p1 = document.getElementById('new_password').value;
            const p2 = document.getElementById('confirm_password').value;
            if (p1.length < 6) { alert('Mínimo 6 caracteres'); return; }
            if (p1 !== p2) { alert('No coinciden'); return; }

            showLoader(3, true);
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userData.username, answers: userData.answers, nueva_password: p1 })
                });
                const data = await res.json();
                if (data.status === 'success') switchStep(3, 'success');
                else alert(data.error);
            } catch (e) { alert('Error de conexión'); }
            finally { showLoader(3, false); }
        }

        function togglePassword(id, el) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
            el.classList.toggle('fa-eye');
            el.classList.toggle('fa-eye-slash');
        }
    </script>
</body>

</html>
