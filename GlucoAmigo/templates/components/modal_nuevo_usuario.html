{# ════════════════════════════════════════════
COMPONENTE: Modal - Nuevo Usuario
Usado en: portal_especialista.html
════════════════════════════════════════════ #}
<div id="modal-nuevo-usuario" class="hidden fixed inset-0 z-[5000] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="cerrarModalNuevoUsuario()"></div>
    <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden animate-modal-in">
        <div class="bg-emerald-600 p-6 text-white text-center">
            <h3 class="text-xl font-black">Registrar Nueva Persona</h3>
            <p class="text-emerald-100 text-xs font-bold uppercase tracking-widest mt-1">Acceso al Sistema Experto</p>
        </div>
        <div class="p-8 space-y-4">
            <div>
                <label class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Nombre de
                    Usuario</label>
                <input type="text" id="user-username" class="med-input bg-slate-50 border-slate-200"
                    placeholder="Ej: dr_garcia">
            </div>
            <div>
                <label class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Nombre
                    Completo</label>
                <input type="text" id="user-nombre" class="med-input bg-slate-50 border-slate-200"
                    placeholder="Nombre y Apellido">
            </div>
            <div>
                <label class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Rol en el
                    Sistema</label>
                <select id="user-rol" class="med-input bg-slate-50 border-slate-200">
                    <option value="padre">Representante / Padre</option>
                    {% if current_user.rol == 'admin' %}
                    <option value="especialista">Especialista (Médico)</option>
                    <option value="nutricionista">Nutricionista</option>
                    <option value="auditor">Auditor (Investigación)</option>
                    <option value="gerente">Gerente Clínico</option>
                    {% endif %}
                </select>
            </div>
            <div>
                <label class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Cédula /
                    ID</label>
                <input type="text" id="user-cedula" class="med-input bg-slate-50 border-slate-200"
                    placeholder="V-12345678">
            </div>
            <div>
                <label class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Email</label>
                <input type="email" id="user-email" class="med-input bg-slate-50 border-slate-200"
                    placeholder="correo@ejemplo.com">
            </div>
            <div>
                <label
                    class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Teléfono</label>
                <input type="tel" id="user-telefono" class="med-input bg-slate-50 border-slate-200"
                    placeholder="+58 412 1234567">
            </div>
            <div>
                <label class="block text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Contraseña
                    Temporal</label>
                <input type="password" id="user-password" class="med-input bg-slate-50 border-slate-200"
                    placeholder="mín. 8 caracteres">
            </div>
            <button onclick="guardarNuevoUsuario()"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98] mt-4">
                <i class="fas fa-user-plus mr-2"></i> Crear Usuario
            </button>
        </div>
    </div>
</div>
