{# ════════════════════════════════════════════════════════════════
MODAL: Cambiar Contraseña del Usuario Actual
════════════════════════════════════════════════════════════════ #}
<div id="modal-cambiar-password" class="hidden fixed inset-0 z-[9000] items-center justify-center p-4"
    onclick="if(event.target===this) cerrarModalPassword()">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>

    <div class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden animate-modal-in">
        <div class="bg-gradient-to-r from-indigo-600 to-violet-600 px-8 py-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div
                    class="w-11 h-11 bg-white/20 rounded-2xl flex items-center justify-center text-white text-xl shadow-inner">
                    <i class="fas fa-key"></i>
                </div>
                <div>
                    <h3 class="text-white font-black text-lg leading-tight">Cambiar Clave</h3>
                    <p class="text-indigo-200 text-xs font-semibold mt-0.5">Seguridad de la cuenta</p>
                </div>
            </div>
            <button onclick="cerrarModalPassword()"
                class="w-9 h-9 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center text-white transition-all">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="px-8 py-6 space-y-4">
            <div>
                <label class="block text-xs font-black text-slate-600 uppercase tracking-wider mb-1.5">
                    <i class="fas fa-lock text-indigo-400 mr-1"></i> Nueva Contraseña
                </label>
                <input id="mi-nueva-password" type="password" placeholder="Mínimo 6 caracteres"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-800 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-600 uppercase tracking-wider mb-1.5">
                    <i class="fas fa-lock-open text-indigo-400 mr-1"></i> Confirmar Contraseña
                </label>
                <input id="mi-nueva-password-conf" type="password" placeholder="Repite la contraseña"
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-800 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition-all">
            </div>
        </div>

        <div class="px-8 py-5 bg-slate-50 border-t border-slate-100 flex items-center justify-end gap-3">
            <button onclick="cerrarModalPassword()"
                class="px-5 py-2.5 rounded-xl text-slate-600 font-black text-sm bg-white border border-slate-200 hover:bg-slate-100 transition-all active:scale-95">
                Cancelar
            </button>
            <button id="btn-guardar-mi-password" onclick="guardarMiPassword()"
                class="px-7 py-2.5 rounded-xl text-white font-black text-sm bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 shadow-lg shadow-indigo-500/30 transition-all active:scale-95 flex items-center gap-2">
                <i class="fas fa-save"></i> Cambiar
            </button>
        </div>
    </div>
</div>
