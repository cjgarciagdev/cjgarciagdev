<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlucoAmigo · Cambio de Contraseña Obligatorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #134e4a 50%, #0f172a 100%);
            min-height: 100vh;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-12px)
            }
        }

        .float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md fade-in">

        <!-- Card principal -->
        <div class="bg-white/10 backdrop-blur-xl rounded-[2.5rem] border border-white/20 shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-amber-500 to-orange-600 px-8 py-8 text-center">
                <div
                    class="w-20 h-20 bg-white/20 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 float shadow-lg shadow-orange-900/30">
                    <i class="fas fa-lock text-white text-4xl"></i>
                </div>
                <h1 class="text-white font-black text-2xl leading-tight">Cambio de Contraseña</h1>
                <p class="text-orange-100 text-sm font-semibold mt-2">Tu administrador requiere que actualices tu
                    contraseña antes de continuar.</p>
            </div>

            <!-- Form -->
            <div class="px-8 py-8">
                <div id="msg-error"
                    class="hidden bg-rose-500/20 border border-rose-400/30 rounded-2xl px-4 py-3 mb-5 text-rose-300 text-sm font-semibold flex items-center gap-2">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="msg-text-error"></span>
                </div>
                <div id="msg-ok"
                    class="hidden bg-emerald-500/20 border border-emerald-400/30 rounded-2xl px-4 py-3 mb-5 text-emerald-300 text-sm font-semibold flex items-center gap-2">
                    <i class="fas fa-check-circle"></i>
                    <span>¡Contraseña actualizada! Redirigiendo...</span>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-black text-white/60 uppercase tracking-wider mb-2">
                            <i class="fas fa-lock mr-1 text-amber-400"></i> Nueva Contraseña
                        </label>
                        <input id="new-pass" type="password" placeholder="Mínimo 6 caracteres"
                            class="w-full bg-white/10 border border-white/20 text-white placeholder-white/30 rounded-2xl px-5 py-4 text-sm font-semibold focus:ring-2 focus:ring-amber-400 focus:border-amber-400 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-black text-white/60 uppercase tracking-wider mb-2">
                            <i class="fas fa-lock-open mr-1 text-amber-400"></i> Confirmar Contraseña
                        </label>
                        <input id="confirm-pass" type="password" placeholder="Repite la nueva contraseña"
                            class="w-full bg-white/10 border border-white/20 text-white placeholder-white/30 rounded-2xl px-5 py-4 text-sm font-semibold focus:ring-2 focus:ring-amber-400 focus:border-amber-400 outline-none transition-all">
                    </div>
                </div>

                <button id="btn-cambiar" onclick="cambiarPassword()"
                    class="w-full mt-7 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-orange-900/30 transition-all active:scale-95 flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-key"></i> Actualizar Contraseña
                </button>

                <a href="{{ url_for('auth.logout') }}"
                    class="w-full mt-4 block text-center text-white/30 hover:text-white/60 font-semibold text-xs transition-all">
                    Cerrar sesión
                </a>
            </div>
        </div>

        <p class="text-center text-white/20 text-xs font-bold mt-6 uppercase tracking-widest">GlucoAmigo · Sistema
            mHealth Pediátrico</p>
    </div>

    <script>
        async function cambiarPassword() {
            const np = document.getElementById('new-pass').value;
            const cp = document.getElementById('confirm-pass').value;
            const errDiv = document.getElementById('msg-error');
            const errText = document.getElementById('msg-text-error');
            const okDiv = document.getElementById('msg-ok');
            const btn = document.getElementById('btn-cambiar');

            errDiv.classList.add('hidden');
            okDiv.classList.add('hidden');

            if (!np || np.length < 6) {
                errText.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                errDiv.classList.remove('hidden');
                return;
            }
            if (np !== cp) {
                errText.textContent = 'Las contraseñas no coinciden.';
                errDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Guardando...';

            try {
                const res = await fetch('/api/auth/perfil', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nueva_password: np })
                });
                // Si la API no soporta nueva_password directamente, usamos la ruta de reset
                const data = await res.json();
                if (res.ok) {
                    okDiv.classList.remove('hidden');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    errText.textContent = data.error || 'Error al cambiar contraseña.';
                    errDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-key"></i> Actualizar Contraseña';
                }
            } catch (e) {
                errText.textContent = 'Error de conexión. Inténtalo de nuevo.';
                errDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> Actualizar Contraseña';
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') cambiarPassword();
        });
    </script>
</body>

</html>
