# Render configuration for GlucoAmigo application
services:
  - type: web
    name: glucoamigo
    # you can switch to runtime: python if you prefer not to build a custom image
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        # for Neon you will manually paste the connection string
        # if you want to use Render's managed Postgres replace this section with a fromDatabase block
        value: ""
    region: ohio

# Optionally define a managed Postgres here instead of using Neon:
# databases:
#   - name: glucoamigo-db
#     plan: free
#     region: ohio
